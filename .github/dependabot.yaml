version: 2
updates:
    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "daily"
          time: "00:00"
          timezone: "Etc/UTC"
      cooldown:
          default-days: 1
          include:
              - "*"
      commit-message:
          prefix: "chore"
      ignore:
          - dependency-name: "@stylistic/eslint-plugin"
          - dependency-name: "es-toolkit"
          - dependency-name: "ts-vista"
          - dependency-name: "oxlint"
